---
- name: Установка необходимых пакетов
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Добавление официального GPG ключа Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  when: ansible_os_family == "Debian"

- name: Добавление репозитория Docker
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
  when: ansible_os_family == "Debian"

- name: Установка Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Запуск и включение Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Установка Docker Compose (если не установлен через плагин)
  get_url:
    url: "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-{{ ansible_system }}-{{ ansible_architecture }}"
    dest: /usr/local/bin/docker-compose
    mode: '0755'
  when: ansible_os_family == "Debian" and docker_compose_plugin is not defined
  ignore_errors: yes

- name: Проверка установки Docker
  command: docker --version
  register: docker_version
  changed_when: false

- name: Проверка установки Docker Compose
  command: docker-compose --version
  register: compose_version
  changed_when: false
  ignore_errors: yes

- name: Вывод информации об установке
  debug:
    msg:
      - "Docker: {{ docker_version.stdout }}"
      - "Docker Compose: {{ compose_version.stdout | default('Не установлен') }}"
